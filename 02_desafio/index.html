<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres para suportar acentos e caracteres especiais-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajuta a escala da opagina para dispositivos móveis-->
    <title>Desafio 2 – Interação dinâmica com inputs</title><!-- Título da página exibido na aba do navegador-->
    <link rel="stylesheet" href="styles.css"><!-- conecta o arquivo CSS para estilizar o página-->
</head>
<body>

<h1>Interação dinâmica com inputs</h1><!-- Título principal da página-->

<!-- Formulário onde o usuário insere o nome-->
<form id="forms">
    <input type="text" id="nome" placeholder="Qual o seu nome?"> <!-- Esse campo serve para o usuário digitar o nome. O atributo id="nome" é importante porque o JavaScript vai precisar identificar esse campo para capturar o valor que foi digitado.-->
        <button type="submit">Enviar</button><!-- botão que dispara a ação-->
</form>
<p id="mensagem"></p><!-- Parágrado onde a mensagem personalizada será exibida-->

    
    <script src="scripts.js"></script><!-- Conecta o Javascript que manupula a interação do formulário-->
</body>
</html>
